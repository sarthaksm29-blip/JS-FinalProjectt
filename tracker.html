<!DOCTYPE html>
<html>

<head>

<title>Health Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

<!-- External JavaScript -->
<script src="script.js"></script>

</head>

<body>

<!-- Navigation Bar -->
<nav class="navbar">

<div class="logo">HealthMate</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="tracker.html">Tracker</a></li>
<li><a href="reports.html">Reports</a></li>
<li><a href="doctor.html">Doctor</a></li>
<li><a href="plans.html">Plans</a></li>
</ul>

</nav>


<!-- Health Input Form -->
<div class="container">

<form>

<!-- Date Input -->
<input type="date" id="date">

<!-- Height Input -->
<input type="number" id="height" placeholder="Height (cm)">

<!-- Weight Input -->
<input type="number" id="weight" placeholder="Weight (kg)">

<!-- Blood Pressure Inputs -->
<input type="number" id="sys" placeholder="BP Systolic">
<input type="number" id="dia" placeholder="BP Diastolic">

<!-- Sugar Level -->
<input type="number" id="sugar" placeholder="Sugar Level">

<!-- BMI Calculation Button -->
<button type="button" onclick="calculateBMI()" class="btn">
Calculate BMI
</button>

<!-- Save Health Record -->
<button type="button" onclick="saveRecord()" class="btn">
Save Record
</button>

<!-- BMI Result Display -->
<div id="bmiResult"></div>

</form>


<!-- Health Records Table -->
<table>

<tr>
<th>Date</th>
<th>Height</th>
<th>Weight</th>
<th>BP</th>
<th>Sugar</th>
<th>BMI</th>
</tr>

<tbody id="recordsTable"></tbody>

</table>

</div>


<!-- Footer -->
<footer>
<p>© 2026 HealthMate</p>
</footer>

</body>
</html>
